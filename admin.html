<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>文化祭サイト管理</title>

<style>

body{
  margin:0;
  padding:30px;
  background:#ffd93d;
  font-family:
  "Hiragino Sans",
  "Noto Sans JP",
  sans-serif;
}

.card{
  max-width:800px;
  margin:auto;

  background:white;

  border-radius:30px;

  padding:30px;

  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  margin-top:0;
  margin-bottom:30px;
}

.input-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input,
textarea{
  width:100%;

  padding:15px;

  border:none;

  border-radius:15px;

  background:#f5f5f5;

  box-sizing:border-box;
}

textarea{
  min-height:120px;
}

.save-btn{
  width:100%;

  border:none;

  background:#ff7b00;

  color:white;

  padding:20px;

  border-radius:999px;

  font-size:18px;

  font-weight:bold;

  cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h1>
文化祭サイト管理
</h1>
  <div class="input-group">
<label>学校名</label>
<input id="schoolName">
</div>

<div class="input-group">
<label>文化祭名</label>
<input id="festivalName">
</div>

<div class="input-group">
<label>クラス名</label>
<input id="className">
</div>

<div class="input-group">
<label>出し物名</label>
<input id="eventName">
</div>

<div class="input-group">
<label>紹介文</label>
<textarea id="description"></textarea>
</div>

<div class="input-group">
<label>場所</label>
<input id="place">
</div>

<div class="input-group">
<label>開催時間</label>
<input id="time">
</div>

<div class="input-group">
<label>待ち時間</label>
<input id="waitTime">
</div>

<div class="input-group">
<label>Instagram</label>
<input id="instagram">
</div>

<button
class="save-btn"
onclick="saveSite()"
>
保存する
</button>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQWVUB4wpormhXyA9jZ6nphU7p0_HqNaU",
  authDomain: "bunkasai-site-maker.firebaseapp.com",
  projectId: "bunkasai-site-maker",
  storageBucket: "bunkasai-site-maker.firebasestorage.app",
  messagingSenderId: "448452725817",
  appId: "1:448452725817:web:f60d3748c3a7b7017651e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params =
  new URLSearchParams(window.location.search);

const id = params.get("id");

const snap = await getDoc(
  doc(db, "sites", id)
);

const data = snap.data();

document.getElementById("schoolName").value =
  data.schoolName || "";

document.getElementById("festivalName").value =
  data.festivalName || "";

document.getElementById("className").value =
  data.className || "";  

document.getElementById("eventName").value =
  data.eventName || "";

document.getElementById("description").value =
  data.description || "";

document.getElementById("place").value =
  data.place || "";

document.getElementById("time").value =
  data.time || "";

document.getElementById("waitTime").value =
  data.waitTime || "";

document.getElementById("instagram").value =
  data.instagram || "";

window.saveSite = async function(){

  await updateDoc(
    doc(db, "sites", id),
    {schoolName:
  document.getElementById("schoolName").value,

festivalName:
  document.getElementById("festivalName").value,

className:
  document.getElementById("className").value,
     
      eventName:
        document.getElementById("eventName").value,

      description:
        document.getElementById("description").value,

      place:
        document.getElementById("place").value,

      time:
        document.getElementById("time").value,

      waitTime:
        document.getElementById("waitTime").value,

      instagram:
        document.getElementById("instagram").value
    }
  );

  alert("保存しました！");
};

</script>
</body>
</html>
