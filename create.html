<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>文化祭サイトメーカー</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:
      "Hiragino Sans",
      "Noto Sans JP",
      sans-serif;

      background:#ffd93d;
      color:#222;
      min-height:100vh;
      overflow-x:hidden;
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
    }

    .title{
      text-align:center;
      margin-bottom:40px;
    }

    .title h1{
      font-size:52px;
      margin-bottom:10px;
    }

    .title p{
      font-size:18px;
      color:#555;
    }

    .main{
      display:flex;
      gap:30px;
      align-items:flex-start;
    }

    .form-box{
      width:55%;
      background:white;
      border-radius:30px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .preview-box{
      width:45%;
      position:sticky;
      top:20px;
    }

    .section-title{
      font-size:24px;
      font-weight:700;
      margin-bottom:25px;
    }

    .input-group{
      margin-bottom:22px;
    }

    label{
      display:block;
      margin-bottom:10px;
      font-weight:700;
      font-size:15px;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:#f5f5f5;
      font-size:16px;
    }

    textarea{
      min-height:120px;
      resize:none;
    }

    .checkbox-group{
      background:#fff6d5;
      padding:16px;
      border-radius:20px;
      margin-bottom:20px;
    }

    .check-item{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .check-item:last-child{
      margin-bottom:0;
    }

    .check-item input{
      width:auto;
      transform:scale(1.3);
    }

    .check-item label{
      margin:0;
      font-size:16px;
    }

    .create-btn{
      width:100%;
      border:none;
      background:#ff7b00;
      color:white;
      padding:22px;
      border-radius:999px;
      font-size:20px;
      font-weight:700;
      cursor:pointer;
      margin-top:10px;
      text-decoration:none;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .phone{
      background:white;
      border-radius:40px;
      padding:20px;
      box-shadow:0 15px 40px rgba(0,0,0,0.15);
    }

    .phone-top{
      width:90px;
      height:10px;
      background:#ddd;
      border-radius:999px;
      margin:auto;
      margin-bottom:20px;
    }

    .festival-card{
      background:#fff7db;
      border-radius:28px;
      padding:24px;
    }

    .festival-name{
      font-size:28px;
      font-weight:900;
      margin-bottom:8px;
      line-height:1.3;
    }

    .festival-sub{
      color:#777;
      margin-bottom:20px;
    }

    .info{
      margin-bottom:18px;
    }

    .info-title{
      font-size:13px;
      color:#777;
      margin-bottom:6px;
    }

    .info-value{
      font-size:18px;
      font-weight:700;
      line-height:1.6;
    }

    .wait-box{
      background:#ff7b00;
      color:white;
      border-radius:24px;
      padding:22px;
      margin-top:20px;
      text-align:center;
    }

    .wait-label{
      font-size:14px;
      opacity:0.8;
      margin-bottom:10px;
    }

    .wait-time{
      font-size:48px;
      font-weight:900;
    }

    .insta-btn{
      display:block;
      width:100%;
      text-align:center;
      margin-top:20px;
      padding:16px;
      border-radius:18px;
      background:#ff4fa3;
      color:white;
      text-decoration:none;
      font-weight:700;
    }

    @media(max-width:900px){

      .container{
        padding:25px 14px;
      }

      .main{
        flex-direction:column;
      }

      .form-box,
      .preview-box{
        width:100%;
      }

      .preview-box{
        position:static;
      }

      .form-box{
        padding:24px;
      }

      .title{
        margin-bottom:25px;
      }

      .title h1{
        font-size:36px;
        line-height:1.3;
      }

      .title p{
        font-size:15px;
      }

      .section-title{
        font-size:22px;
      }

      input,
      textarea,
      select{
        font-size:16px;
      }

      .checkbox-group{
        padding:14px;
      }

      .check-item{
        align-items:flex-start;
      }

      .check-item label{
        line-height:1.6;
        font-size:15px;
      }

      .phone{
        border-radius:30px;
        padding:16px;
      }

      .festival-card{
        padding:20px;
      }

      .festival-name{
        font-size:24px;
      }

      .info-value{
        font-size:16px;
      }

      .wait-time{
        font-size:42px;
      }

      .create-btn{
        padding:20px;
        font-size:18px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">

      <h1>
        🎉 文化祭サイトメーカー
      </h1>

      <p>
        文化祭サイトをかんたん作成
      </p>

    </div>

    <div class="main">

      <div class="form-box">

        <div class="section-title">
          基本情報
        </div>

        <div class="input-group">
          <label>学校名</label>
          <input
  type="text"
  id="schoolName"
  placeholder="〇〇高校"
>
        </div>

        <div class="input-group">
          <label>文化祭名</label>
          <input type="text" 
            id="festivalName"
            placeholder="文化祭2026">
        </div>

        <div class="input-group">
          <label>クラス・団体名</label>
          <input type="text"
            id="className"
            placeholder="3年3組">
        </div>

        <div class="input-group">
          <label>出し物名</label>
          <input type="text"
            id="eventName"
            placeholder="3-3 脱出ゲーム">
        </div>

        <div class="input-group">
          <label>ジャンル</label>

          <select id="genre">
            <option>脱出ゲーム</option>
            <option>お化け屋敷</option>
            <option>模擬店</option>
            <option>展示</option>
            <option>ステージ発表</option>
          </select>
        </div>

        <div class="input-group">
          <label>紹介文</label>

          <textarea 
            id="description"
            placeholder="紹介文を入力"></textarea>
        </div>

        <div class="input-group">
          <label>場所</label>
          <input type="text" 
            id="place"
            placeholder="3年3組 教室">
        </div>

        <div class="input-group">
          <label>開催時間</label>
          <input type="text" 
            id="time"
            placeholder="9:00〜15:00">
        </div>

        <div class="section-title">
          オプション機能
        </div>

        <div class="checkbox-group">

          <div class="check-item">
            <input type="checkbox" checked>
            <label>待ち時間機能を使う</label>
          </div>

          <div class="check-item">
            <input type="checkbox" checked>
            <label>Instagramを表示する</label>
          </div>

        </div>

        <div class="input-group">
          <label>現在の待ち時間</label>
          <input type="text"
            id="waitTime"
            placeholder="30分">
        </div>

        <div class="input-group">
          <label>Instagram</label>
          <input type="text" 
            id="instagram"
            placeholder="@festival">
        </div>

        <button class="create-btn" onclick="goToSite()">
  サイトを作成 →
</button>

      </div>

      <div class="preview-box">

        <div class="phone">

          <div class="phone-top"></div>

          <div class="festival-card">

            <div class="festival-name">
              3-3 脱出ゲーム
            </div>

            <div class="festival-sub">
              3年3組 ・ 文化祭企画
            </div>

            <div class="info">
              <div class="info-title">
                ジャンル
              </div>

              <div class="info-value">
                脱出ゲーム
              </div>
            </div>

            <div class="info">
              <div class="info-title">
                場所
              </div>

              <div class="info-value">
                3年3組 教室
              </div>
            </div>

            <div class="info">
              <div class="info-title">
                開催時間
              </div>

              <div class="info-value">
                9:00〜15:00
              </div>
            </div>

            <div class="info">
              <div class="info-title">
                紹介
              </div>

              <div class="info-value">
                教室に仕掛けられた謎を解き、
                制限時間内に脱出しよう！
              </div>
            </div>

            <div class="wait-box">

              <div class="wait-label">
                現在の待ち時間
              </div>

              <div class="wait-time">
                30分
              </div>

            </div>

            <a href="" class="insta-btn">
              📸 Instagramを見る
            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

    window.goToSite = goToSite;

</script>
</body>
</html>
