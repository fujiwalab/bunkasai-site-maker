<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>文化祭サイトメーカー</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:
      "Hiragino Sans",
      "Noto Sans JP",
      sans-serif;

      background:#ffd93d;
      overflow-x:hidden;
      color:#222;
    }

    header{
      width:100%;
      padding:25px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      font-size:28px;
      font-weight:700;
    }

    nav{
      display:flex;
      gap:30px;
      align-items:center;
    }

    nav a{
      text-decoration:none;
      color:#333;
      font-weight:600;
    }

    .top-btn{
      background:#ff7b00;
      color:white;
      padding:14px 28px;
      border-radius:999px;
      text-decoration:none;
      font-weight:bold;
      transition:0.2s;
    }

    .top-btn:hover{
      transform:scale(1.05);
    }

    .hero{
      width:100%;
      min-height:85vh;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:40px 8%;
      position:relative;
    }

    .left{
      width:50%;
      z-index:2;
    }

    .tag{
      background:white;
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;
      font-weight:700;
      margin-bottom:25px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    h1{
      font-size:72px;
      line-height:1.1;
      margin-bottom:25px;
      font-weight:900;
    }

    .orange{
      color:#ff7b00;
    }

    .description{
      font-size:20px;
      line-height:1.8;
      margin-bottom:35px;
    }

    .main-btn{
      background:#ff7b00;
      color:white;
      border:none;
      padding:22px 42px;
      border-radius:999px;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
      box-shadow:0 10px 20px rgba(255,123,0,0.3);
    }

    .main-btn:hover{
      transform:translateY(-4px);
    }

    .features{
      display:flex;
      gap:20px;
      margin-top:40px;
      flex-wrap:wrap;
    }

    .feature{
      background:white;
      padding:18px 24px;
      border-radius:20px;
      font-weight:700;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .right{
      width:45%;
      display:flex;
      justify-content:center;
      position:relative;
      z-index:2;
    }

    .phone{
      width:320px;
      background:white;
      border-radius:40px;
      padding:20px;
      box-shadow:0 25px 50px rgba(0,0,0,0.2);
    }

    .phone-top{
      width:100px;
      height:10px;
      background:#ddd;
      border-radius:999px;
      margin:0 auto 20px;
    }

    .festival-image{
      width:100%;
      height:220px;
      border-radius:20px;
      object-fit:cover;
      margin-bottom:20px;
    }

    .wait-title{
      font-size:18px;
      color:#666;
      margin-bottom:10px;
    }

    .wait-time{
      font-size:60px;
      color:#ff7b00;
      font-weight:900;
    }

    .minutes{
      font-size:24px;
    }

    .confetti{
      position:absolute;
      width:14px;
      height:14px;
      border-radius:4px;
      opacity:0.7;
      z-index:1;
    }

    .c1{
      background:#ff6b6b;
      top:15%;
      left:10%;
    }

    .c2{
      background:#4ecdc4;
      top:30%;
      left:85%;
    }

    .c3{
      background:#845ef7;
      top:70%;
      left:20%;
    }

    .c4{
      background:#ff922b;
      top:80%;
      left:75%;
    }

    .c5{
      background:#51cf66;
      top:50%;
      left:50%;
    }

    @media(max-width:900px){

      .hero{
        flex-direction:column;
        text-align:center;
        gap:50px;
      }

      .left{
        width:100%;
      }

      .right{
        width:100%;
      }

      h1{
        font-size:52px;
      }

      nav a{
        display:none;
      }

      .features{
        justify-content:center;
      }
    }
  </style>
</head>

<body>

  <div class="confetti c1"></div>
  <div class="confetti c2"></div>
  <div class="confetti c3"></div>
  <div class="confetti c4"></div>
  <div class="confetti c5"></div>

  <header>
    <div class="logo">
       文化祭サイトメーカー
    </div>

    <nav>
      <a href="">特徴</a>
      <a href="">使い方</a>
      <a href="">テンプレート</a>
      <a href="">FAQ</a>

      <a href="" class="top-btn">
        サイトを作る
      </a>
    </nav>
  </header>

  <section class="hero">

    <div class="left">

      <div class="tag">
        高校・大学文化祭対応
      </div>

      <h1>
        文化祭サイトを<br>
        <span class="orange">かんたんに</span>作ろう！
      </h1>

      <p class="description">
        待ち時間表示・Instagram連携・<br>
        QRコード共有など、<br>
        文化祭に必要な機能をまとめて作成。
      </p>

      <a href="create.html" class="main-btn">
  サイトを作る →
</a>

      <div class="features">

        <div class="feature">
          ⏰ 待ち時間表示
        </div>

        <div class="feature">
          📸 Instagram連携
        </div>

        <div class="feature">
          🔗 QRコード共有
        </div>

      </div>

    </div>

    <div class="right">

      <div class="phone">

        <div class="phone-top"></div>

        <img
          class="festival-image"
          src="https://images.unsplash.com/photo-1505236858219-8359eb29e329?q=80&w=1200&auto=format&fit=crop"
        >

        <div class="wait-title">
          フジワラボ待ち時間
        </div>

        <div class="wait-time">
          30<span class="minutes">分</span>
        </div>

      </div>

    </div>

  </section>

</body>
</html>
