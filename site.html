<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>完成サイト</title>

  <style>

    body{
      margin:0;
      padding:30px;
      font-family:
      "Hiragino Sans",
      "Noto Sans JP",
      sans-serif;

      background:#ffd93d;
    }

    .card{
      max-width:700px;
      margin:auto;

      background:white;
      border-radius:30px;

      padding:30px;

      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    .school{
      font-size:18px;
      color:#777;
      margin-bottom:10px;
    }

    .title{
      font-size:42px;
      font-weight:900;
      margin-bottom:20px;
    }

    .info{
      margin-bottom:20px;
    }

    .label{
      font-size:14px;
      color:#777;
      margin-bottom:5px;
    }

    .value{
      font-size:22px;
      font-weight:700;
      line-height:1.6;
    }

    .wait-box{
      background:#ff7b00;
      color:white;

      padding:25px;

      border-radius:24px;

      margin-top:30px;

      text-align:center;
    }

    .wait-label{
      opacity:0.8;
      margin-bottom:10px;
    }

    .wait-time{
      font-size:52px;
      font-weight:900;
    }

    .insta-btn{
      display:block;

      margin-top:25px;

      text-align:center;

      background:#ff4fa3;

      color:white;

      text-decoration:none;

      padding:18px;

      border-radius:18px;

      font-weight:700;
    }

    @media(max-width:700px){

      body{
        padding:18px;
      }

      .card{
        padding:22px;
      }

      .title{
        font-size:32px;
      }

      .value{
        font-size:18px;
      }

      .wait-time{
        font-size:42px;
      }

    }

  </style>
</head>

<body>

  <div class="card">

    <div
      class="school"
      id="schoolName"
    >
    </div>

    <div
      class="title"
      id="eventName"
    >
    </div>

    <div class="info">

      <div class="label">
        クラス
      </div>

      <div
        class="value"
        id="className"
      >
      </div>

    </div>

    <div class="info">

      <div class="label">
        ジャンル
      </div>

      <div
        class="value"
        id="genre"
      >
      </div>

    </div>

    <div class="info">

      <div class="label">
        場所
      </div>

      <div
        class="value"
        id="place"
      >
      </div>

    </div>

    <div class="info">

      <div class="label">
        開催時間
      </div>

      <div
        class="value"
        id="time"
      >
      </div>

    </div>
<div class="info">

  <div class="label">
    作成日時
  </div>

  <div
    class="value"
    id="createdAt"
  >
  </div>

</div>
<div class="info">

  <div class="label">
    最終更新
  </div>

  <div
    class="value"
    id="updatedAt"
  >
  </div>

</div>
    
    <div class="info">

      <div class="label">
        紹介
      </div>

      <div
        class="value"
        id="description"
      >
      </div>

    </div>

    <div class="wait-box">

      <div class="wait-label">
        現在の待ち時間
      </div>

      <div
        class="wait-time"
        id="waitTime"
      >
      </div>

    </div>

    <a
      href="#"
      class="insta-btn"
      id="instagram"
    >
      Instagramを見る
    </a>

<div class="info">

  <div class="label">
    サイトURL
  </div>

  <input
    id="siteUrl"
    readonly
  >

  <button onclick="copySiteUrl()">
    サイトURLをコピー
  </button>

</div>

<div class="info">

  <div class="label">
    管理URL
  </div>

  <input
    id="adminUrl"
    readonly
  >

  

  <button onclick="copyAdminUrl()">
    管理URLをコピー
  </button>

</div>
    <div class="info">

  <div class="label">
    QRコード
  </div>

  <img
    id="qrCode"
    style="
      width:220px;
      margin-top:10px;
      border-radius:15px;
      background:white;
      padding:10px;
    "
  >

</div>
</div>

 <script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQWVUB4wpormhXyA9jZ6nphU7p0_HqNaU",
  authDomain: "bunkasai-site-maker.firebaseapp.com",
  projectId: "bunkasai-site-maker",
  storageBucket: "bunkasai-site-maker.firebasestorage.app",
  messagingSenderId: "448452725817",
  appId: "1:448452725817:web:f60d3748c3a7b7017651e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params =
  new URLSearchParams(window.location.search);

const id = params.get("id");

const snap = await getDoc(
  doc(db, "sites", id)
);

const data = snap.data();

document.getElementById("schoolName").innerText =
  data.schoolName || "";

document.getElementById("eventName").innerText =
  data.eventName || "";

document.getElementById("className").innerText =
  data.className || "";

document.getElementById("genre").innerText =
  data.genre || "";

document.getElementById("place").innerText =
  data.place || "";

document.getElementById("time").innerText =
  data.time || "";

document.getElementById("description").innerText =
  data.description || "";

document.getElementById("waitTime").innerText =
  data.waitTime || "";

document.getElementById("instagram").innerText =
  data.instagram || "";
   
   document.getElementById("instagram").href =
  data.instagram || "#";
   
document.getElementById("createdAt").innerText =
  data.createdAt || "";

   document.getElementById("updatedAt").innerText =
  data.updatedAt || "未更新";

document.getElementById("siteUrl").value =
  window.location.href;

document.getElementById("adminUrl").value =
  window.location.href.replace(
    "site.html",
    "admin.html"
  );

   document.getElementById("qrCode").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
  + encodeURIComponent(window.location.href);

window.copySiteUrl = function(){

  navigator.clipboard.writeText(
    document.getElementById("siteUrl").value
  );

  alert("サイトURLをコピーしました！");
};

window.copyAdminUrl = function(){

  navigator.clipboard.writeText(
    document.getElementById("adminUrl").value
  );

  alert("管理URLをコピーしました！");
};
  
</script>

</body>
</html>
